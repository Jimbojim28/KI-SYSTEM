  url: http://192.168.12.175
logging:
  level: INFO
  max_size_mb: 100
  path: logs/ki_system.log
ml_auto_trainer:
  enabled: true
  min_samples_heating: 200
  min_samples_lighting: 100
  run_hour: 2
models:
  energy_optimizer:
    constraints:
      comfort_priority: 0.7
      max_temperature: 23
      min_temperature: 18
    target: minimize_cost
    type: optimization
  heating:
    features:
    - hour_of_day
    - day_of_week
    - outdoor_temperature
    - current_temperature
    - target_temperature
    - presence
    - energy_price
    min_training_samples: 200
    retrain_interval_hours: 24
    type: gradient_boosting
  lighting:
    features:
    - hour_of_day
    - day_of_week
    - brightness
    - motion
    - presence
    - weather_condition
    min_training_samples: 100
    retrain_interval_hours: 24
    type: random_forest
platform:
  type: homey
platforms:
  enable_multi_platform: true
  primary: homey
  secondary: null
  weather:
    api_key: 38798b2dac621edacee82ac6226552be
    enabled: true
    location: Berlin, DE
