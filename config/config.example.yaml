# KI-SYSTEM Konfiguration - BEISPIELDATEI
# Kopiere diese Datei nach config.yaml und passe die Werte an
# WICHTIG: config.yaml wird NICHT in Git gespeichert (enthält sensible Daten)

data_collection:
  collect_types:
    bathroom_data: true
    heating_observations: true
    lighting_events: true
    sensor_data: true
    temperature_data: true
    weather_data: true
    window_states: true
  interval_seconds: 300
  platform_sources:
    bathroom_data:
      homeassistant: false
      homey: true
    heating_observations:
      homeassistant: false
      homey: true
    lighting_events:
      homeassistant: true
      homey: true
    temperature_data:
      homeassistant: true
      homey: true
    window_states:
      homeassistant: true
      homey: true
  sensors:
    door:
    - binary_sensor.front_door
    - binary_sensor.back_door
    humidity:
    - sensor.living_room_humidity
    - sensor.bedroom_humidity
    - sensor.bathroom_humidity
    light:
    - sensor.living_room_brightness
    - sensor.bedroom_brightness
    - sensor.outdoor_brightness
    motion:
    - binary_sensor.living_room_motion
    - binary_sensor.bedroom_motion
    - binary_sensor.kitchen_motion
    power:
    - sensor.total_power_consumption
    presence:
    - binary_sensor.someone_home
    temperature:
    - sensor.living_room_temperature
    - sensor.bedroom_temperature
    - sensor.kitchen_temperature
    window:
    - binary_sensor.living_room_window
    - binary_sensor.bedroom_window
    - binary_sensor.kitchen_window

# Background Data Collectors - Konfigurierbare API-Abfrageintervalle
collectors:
  heating:
    enabled: true
    interval: 120  # Sekunden (2 Minuten)
  lighting:
    enabled: true
    interval: 180  # Sekunden (3 Minuten)
  windows:
    enabled: true
    interval: 90  # Sekunden (1.5 Minuten) - wichtig für Sicherheit
  temperature:
    enabled: true
    interval: 120  # Sekunden (2 Minuten)
  bathroom:
    enabled: false
    interval: 60  # Sekunden (1 Minute) - wenn aktiviert

database:
  path: data/ki_system.db
  retention_days: 90
  type: sqlite

decision_engine:
  confidence_threshold: 0.7
  mode: auto
  rules:
  - action: heating == off
    condition: window_sensor == open
    name: no_heating_when_windows_open
  - action: eco_mode == true
    condition: away_mode == true
    name: presence_override
  safety_checks: true

external_data:
  energy_prices:
    api_key: ''
    enabled: false
    provider: awattar

# Home Assistant Konfiguration
homeassistant:
  url: http://YOUR_HA_IP:8123
  token: YOUR_LONG_LIVED_ACCESS_TOKEN

# Homey Pro Konfiguration
homey:
  url: http://YOUR_HOMEY_IP
  token: YOUR_HOMEY_API_TOKEN

logging:
  level: INFO
  max_size_mb: 100
  path: logs/ki_system.log

ml_auto_trainer:
  enabled: true
  min_samples_heating: 200
  min_samples_lighting: 100
  run_hour: 2

models:
  energy_optimizer:
    constraints:
      comfort_priority: 0.7
      max_temperature: 23
      min_temperature: 18
    target: minimize_cost
    type: optimization
  heating:
    features:
    - hour_of_day
    - day_of_week
    - outdoor_temperature
    - current_temperature
    - target_temperature
    - presence
    - energy_price
    min_training_samples: 200
    retrain_interval_hours: 24
    type: gradient_boosting
  lighting:
    features:
    - hour_of_day
    - day_of_week
    - brightness
    - motion
    - presence
    - weather_condition
    min_training_samples: 100
    retrain_interval_hours: 24
    type: random_forest

platform:
  type: homey

platforms:
  enable_multi_platform: true
  primary: homey
  secondary: null
  weather:
    api_key: YOUR_OPENWEATHERMAP_API_KEY
    enabled: true
    location: Berlin, DE

# Benachrichtigungen (Pushover + ChatGPT)
notifications:
  # Pushover für Push-Benachrichtigungen
  pushover:
    enabled: true
    api_token: YOUR_PUSHOVER_API_TOKEN
    user_key: YOUR_PUSHOVER_USER_KEY
  
  # OpenAI/ChatGPT für intelligente Texte
  openai:
    enabled: true
    api_key: YOUR_OPENAI_API_KEY
    model: gpt-4o-mini
  
  # Allgemeine Einstellungen
  default_priority: 0
  quiet_hours_start: '22:00'
  quiet_hours_end: '07:00'
  chatgpt_style: freundlich
  max_text_length: 100
  custom_prompt: ''
  
  # Event-Konfiguration
  events:
    window_open_long:
      enabled: true
      threshold_minutes: 15
    temperature_alert:
      enabled: true
      threshold_deviation: 3
    humidity_alert:
      enabled: true
    co2_alert:
      enabled: true
      threshold_ppm: 1200
    ventilation_complete:
      enabled: false
    morning_summary:
      enabled: false
      time: '07:00'
    mold_risk:
      enabled: true
